<script type="text/javascript">
    RED.nodes.registerType('mcz-out', {
        category: 'MCZ',
        color: '#E84A36',
        icon: 'font-awesome/fa-fire',
        align: 'right',
        inputs: 1,
        outputs: 0,
        defaults: {
            name: { value: '' },
            stoveConfig: { value: '', type: 'mcz-config', required: true },
            command: { value: '' },
            payloadType: { value: 'msg' },
            fixedValue: { value: '' }
        },
        label: function () {
            if (this.name) return this.name;
            const cfgNode = RED.nodes.node(this.stoveConfig);
            return cfgNode ? cfgNode.label() : 'MCZ Out';
        },
        paletteLabel: 'MCZ Out',
        oneditprepare: function () {
            $("#node-input-payloadType").on("change", function () {
                if ($(this).val() === "fixed") {
                    $("#row-fixed-value").show();
                } else {
                    $("#row-fixed-value").hide();
                }
            });
        }
    });
</script>

<script type="text/html" data-template-name="mcz-out">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> <span data-i18n="mcz-out.label.name"></span></label>
        <input type="text" id="node-input-name" placeholder="Name">
    </div>
    <div class="form-row">
        <label for="node-input-stoveConfig"><i class="fa fa-cogs"></i> <span data-i18n="mcz-out.label.stoveConfig"></span></label>
        <input type="text" id="node-input-stoveConfig">
    </div>
    <hr>
    <div class="form-row">
        <label for="node-input-command"><i class="fa fa-terminal"></i> <span data-i18n="mcz-out.label.command"></span></label>
        <select id="node-input-command" style="width:70%;">
            <option value="">-- From msg.payload.command --</option>
            <option value="Power">Power (ON/OFF)</option>
            <option value="Temperature">Temperature (°C)</option>
            <option value="Boiler_Setpoint">Boiler Setpoint (°C)</option>
            <option value="Power_Level">Power Level (1-5)</option>
            <option value="Fan_State">Fan State (0-6)</option>
            <option value="DuctedFan1">Ducted Fan 1 (0-6)</option>
            <option value="DuctedFan2">Ducted Fan 2 (0-6)</option>
            <option value="Eco_Mode">Eco Mode (ON/OFF)</option>
            <option value="Silent_Mode">Silent Mode (ON/OFF)</option>
            <option value="Active_Mode">Active Mode (ON/OFF)</option>
            <option value="Control_Mode">Control Mode (ON/OFF)</option>
            <option value="Chronostat">Chronostat (ON/OFF)</option>
            <option value="Sleep">Sleep (Minutes)</option>
            <option value="Summer_Mode">Summer Mode (ON/OFF)</option>
            <option value="AntiFreeze">AntiFreeze Temp (°C)</option>
            <option value="Sound_Effects">Sound Effects (ON/OFF)</option>
            <option value="Reset_Alarm">Reset Alarm (Trigger)</option>
            <option value="Reset_Active">Reset Active (Trigger)</option>
        </select>
    </div>
    <div class="form-row">
        <label for="node-input-payloadType"><i class="fa fa-envelope"></i> <span data-i18n="mcz-out.label.value"></span></label>
        <select id="node-input-payloadType" style="width:70%;">
            <option value="msg">-- From msg.payload.value --</option>
            <option value="fixed">Fixed value</option>
        </select>
    </div>
    <div class="form-row" id="row-fixed-value">
        <label for="node-input-fixedValue"><i class="fa fa-pencil"></i> <span data-i18n="mcz-out.label.fixedValue"></span></label>
        <input type="text" id="node-input-fixedValue" placeholder="e.g. 1, 21.5, ON, OFF" style="width:70%;">
    </div>
</script>

<script type="text/html" data-help-name="mcz-out">
    <p>Write node for MCZ stoves. Sends write and execution commands to the MCZ Cloud API.</p>
    <h3>Settings</h3>
    <ul>
        <li><b>Configuration</b>: The configuration node associated with the stove.</li>
    </ul>
    <h3>Input</h3>
    <p>This node processes two types of <code>msg.payload</code> to send commands to the server:</p>
    <ul>
        <li><b>Object Format (Recommended):</b><br/>
            <code>{ "command": "Power", "value": 1 }</code><br/>
            Available commands: <code>Power, Temperature, Power_Level, Fan_State, DuctedFan1, DuctedFan2, Eco_Mode, Silent_Mode, Sleep, etc.</code><br/>
            The node automatically converts this JSON object into the correct raw string for the API.
            Depends on the command, the value can be a string or a number and sometimes a number needs to be multiplied by 2.
        </li>
        <li><b>Raw String Format:</b><br/>
            Pass the raw Socket.IO string directly (e.g. <code>C|WriteParametri|34|1</code>). Useful for unsupported features or unmapped diagnostic codes.
        </li>
    </ul>
</script>
