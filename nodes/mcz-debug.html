<script type="text/javascript">
    RED.nodes.registerType('mcz-debug', {
        category: 'MCZ',
        color: '#FFB347',
        icon: 'font-awesome/fa-bug',
        inputs: 0,
        outputs: 1,
        defaults: {
            name:        { value: '' },
            stoveConfig: { value: '', type: 'mcz-config', required: true },
        },
        label: function() {
            return this.name || 'MCZ Debug';
        },
        paletteLabel: 'MCZ Debug',
    });
</script>

<script type="text/html" data-template-name="mcz-debug">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> <span data-i18n="mcz-debug.label.name"></span></label>
        <input type="text" id="node-input-name" placeholder="MCZ Debug">
    </div>
    <div class="form-row">
        <label for="node-input-stoveConfig"><i class="fa fa-cogs"></i> <span data-i18n="mcz-debug.label.stoveConfig"></span></label>
        <input type="text" id="node-input-stoveConfig">
    </div>

    <!-- ── Inline help ──────────────────────────────────────────────── -->
    <div class="form-tips" style="margin-top:12px" data-i18n="[html]mcz-debug.label.tips"></div>
</script>

<script type="text/html" data-help-name="mcz-debug">
    <div data-i18n="[html]mcz-debug.help"></div>
</script>
