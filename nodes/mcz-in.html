<script type="text/javascript">
    RED.nodes.registerType('mcz-in', {
        category: 'MCZ',
        color: '#E84A36',
        icon: 'font-awesome/fa-fire',
        inputs: 1,
        outputs: 1,
        defaults: {
            name: { value: '' },
            stoveConfig: { value: '', type: 'mcz-config', required: true },
            outputRaw: { value: false }
        },
        label: function() {
            if (this.name) return this.name;
            const cfgNode = RED.nodes.node(this.stoveConfig);
            return cfgNode ? cfgNode.label() : 'MCZ In';
        },
        paletteLabel: 'MCZ In'
    });
</script>

<script type="text/html" data-template-name="mcz-in">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Name">
    </div>
    <div class="form-row">
        <label for="node-input-stoveConfig"><i class="fa fa-cogs"></i> Configuration</label>
        <input type="text" id="node-input-stoveConfig">
    </div>
    <div class="form-row">
        <label for="node-input-outputRaw"><i class="fa fa-code"></i> Output raw data</label>
        <input type="checkbox" id="node-input-outputRaw" style="width:auto">
        <span style="margin-left:6px;font-size:0.85em;color:#888">Appends <code>msg.raw</code> to the output</span>
    </div>
</script>

<script type="text/html" data-help-name="mcz-in">
    <p>Read node for MCZ stoves. Receives real-time state from the cloud.</p>
    <h3>Settings</h3>
    <ul>
        <li><b>Configuration</b>: The configuration node representing your stove.</li>
    </ul>
    <h3>Output</h3>
    <ul>
        <li><code>msg.topic</code> will be <code>mcz/SERIALNUMBER</code></li>
        <li><code>msg.payload</code> will contain parsed structured data (e.g. temperatures, fan states).</li>
        <li><code>msg.raw</code> (optional) raw string directly from the MCZ cloud.</li>
    </ul>
    <h3>Input</h3>
    <p>You can send commands in <code>msg.payload</code> to control the connection behavior:</p>
    <ul>
        <li><code>"connect"</code>: Connects the socket to the stove</li>
        <li><code>"disconnect"</code>: Disconnects the socket</li>
        <li><code>"get"</code>: Requests an immediate update (especially useful if auto-polling is set to 0)</li>
    </ul>
</script>
