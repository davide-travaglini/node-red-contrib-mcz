<script type="text/javascript">
    RED.nodes.registerType('mcz-in', {
        category: 'MCZ',
        color: '#E84A36',
        icon: 'font-awesome/fa-fire',
        inputs: 1,
        outputs: 2,
        defaults: {
            name: { value: '' },
            stoveConfig: { value: '', type: 'mcz-config', required: true },
            outputRaw: { value: false },
            enableHaDiscovery: { value: false }
        },
        label: function() {
            if (this.name) return this.name;
            const cfgNode = RED.nodes.node(this.stoveConfig);
            return cfgNode ? cfgNode.label() : 'MCZ In';
        },
        paletteLabel: 'MCZ In'
    });
</script>

<script type="text/html" data-template-name="mcz-in">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> <span data-i18n="mcz-in.label.name"></span></label>
        <input type="text" id="node-input-name" data-i18n="[placeholder]mcz-in.label.namePlaceholder">
    </div>
    <div class="form-row">
        <label for="node-input-stoveConfig"><i class="fa fa-cogs"></i> <span data-i18n="mcz-in.label.stoveConfig"></span></label>
        <input type="text" id="node-input-stoveConfig">
    </div>
    <div class="form-row">
        <label for="node-input-outputRaw"><i class="fa fa-code"></i> <span data-i18n="mcz-in.label.outputRaw"></span></label>
        <input type="checkbox" id="node-input-outputRaw" style="width:auto">
        <span style="margin-left:6px;font-size:0.85em;color:#888" data-i18n="mcz-in.label.outputRawTip">Appends <code>msg.raw</code> to the output</span>
    </div>
    <div class="form-row">
        <label for="node-input-enableHaDiscovery"><i class="fa fa-home"></i> <span data-i18n="mcz-in.label.enableHaDiscovery"></span></label>
        <input type="checkbox" id="node-input-enableHaDiscovery" style="width:auto">
        <span style="margin-left:6px;font-size:0.85em;color:#888" data-i18n="mcz-in.label.enableHaDiscoveryTip">Emit MQTT Discovery payload on connect</span>
    </div>
</script>

<script type="text/html" data-help-name="mcz-in">
    <div data-i18n="[html]mcz-in.help"></div>
</script>
